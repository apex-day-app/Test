<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>नोट्स - तुरंत खुलने वाला</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;padding-bottom:70px}
.top-bar{background:#1a1a1a;padding:12px 16px;border-bottom:2px solid #ffd966;position:sticky;top:0;z-index:100}
.app-title{font-size:1.5rem;font-weight:700;color:#ffd966}
.folder-scroll{background:#0d0d0d;padding:8px 0;overflow-x:auto;white-space:nowrap;display:flex;gap:8px;padding-left:12px;padding-right:12px;border-bottom:1px solid #222}
.folder-item{background:#2a2a2a;padding:6px 18px;border-radius:30px;font-size:0.85rem;font-weight:600;color:#ddd;cursor:pointer;display:inline-block;transition:all 0.1s}
.folder-item.active{background:#ffd966;color:#000}
.folder-item:active{transform:scale(0.96)}
.notes-list{display:flex;flex-direction:column;gap:8px;padding:12px}
.note-item{background:#1a1a1a;border-radius:16px;padding:12px;border:1px solid #2a2a2a;cursor:pointer;transition:all 0.05s}
.note-item.selected{background:#2a2a2a;border:2px solid #ffd966}
.note-title{font-size:1rem;font-weight:600;color:#fff;margin-bottom:6px;display:flex;gap:8px;align-items:center}
.note-number{background:#2a2a2a;padding:2px 8px;border-radius:12px;font-size:0.7rem;color:#aaa}
.note-preview{font-size:0.8rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-card{background:#111;border-radius:16px;padding:12px;border:1px dashed #444}
.empty-card-header{background:#1a1a1a;padding:10px;border-radius:12px;margin-bottom:8px;font-weight:600;color:#ddd;outline:none}
.empty-text-input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px;color:#fff;font-size:0.9rem;outline:none;margin:8px 0}
.empty-text-input:focus{border-color:#ffd966}
button{background:#2a2a2a;border:none;padding:6px 14px;border-radius:20px;color:#fff;font-weight:600;cursor:pointer;transition:all 0.05s}
button:active{transform:scale(0.95)}
.copy-btn,.paste-btn{background:#333;padding:4px 10px;font-size:0.7rem}
.save-inside-text{background:#ffd966;color:#000;margin-top:8px;width:100%}
.selection-toolbar{position:fixed;bottom:0;left:0;right:0;background:#2e7d32;padding:12px;display:flex;justify-content:space-between;z-index:200;transform:translateY(100%);transition:transform 0.2s}
.selection-toolbar.show{transform:translateY(0)}
.fullscreen-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:1000;padding:20px;overflow-y:auto}
.fullscreen-header{display:flex;justify-content:space-between;margin-bottom:20px}
.fullscreen-header input{background:#1a1a1a;border:none;color:#fff;font-size:1.3rem;font-weight:600;padding:8px;border-radius:12px;flex:1;margin-right:12px;outline:none}
.fullscreen-content{background:#111;padding:16px;border-radius:16px;color:#ddd;font-size:1rem;line-height:1.5;min-height:200px;outline:none}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:40px;font-size:0.8rem;z-index:1100;animation:fadeOut 0.8s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="app-title">📝 मेरे नोट्स</div>
</div>

<div id="foldersList" class="folder-scroll"></div>

<div class="notes-container">
  <div id="notesListArea" class="notes-list"></div>
</div>

<div class="selection-toolbar" id="selectionToolbar">
  <span id="selectionCount">0</span>
  <div style="display:flex;gap:8px">
    <button id="selectAllBtn">सब</button>
    <button id="pinSelectedBtn">📌 पिन</button>
    <button id="deleteSelectedBtn" style="background:#c62828">हटाएँ</button>
    <button id="cancelSelectionBtn">रद्द</button>
  </div>
</div>

<script>
// ============== डेटा ==============
let folders = [{id:'f1', name:'मुख्य'}];
let notes = [];
let currentFolderId = 'f1';
let selectionMode = false;
let selectedNotes = new Set();
let selectedOrder = [];

// ============== फंक्शन ==============
function saveToLocal() {
  localStorage.setItem('notes_folders', JSON.stringify(folders));
  localStorage.setItem('notes_notes', JSON.stringify(notes));
}

function loadFromLocal() {
  const savedFolders = localStorage.getItem('notes_folders');
  const savedNotes = localStorage.getItem('notes_notes');
  if(savedFolders) folders = JSON.parse(savedFolders);
  if(savedNotes) notes = JSON.parse(savedNotes);
  if(folders.length === 0) folders = [{id:'f1', name:'मुख्य'}];
  if(!currentFolderId) currentFolderId = folders[0].id;
  
  // हर फोल्डर के लिए खाली नोट बनाओ
  folders.forEach(folder => {
    const emptyId = `empty_${folder.id}`;
    if(!notes.find(n => n.id === emptyId)) {
      notes.push({id: emptyId, folderId: folder.id, title: "", content: "", isEmpty: true});
    }
  });
  saveToLocal();
}

function showToast(msg) {
  let old = document.querySelector('.toast');
  if(old) old.remove();
  let div = document.createElement('div');
  div.className = 'toast';
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 800);
}

async function copyText(text, btn) {
  if(text && text.trim()) {
    await navigator.clipboard.writeText(text);
    let oldText = btn.innerText;
    btn.innerText = '✓';
    showToast('कॉपी हो गया!');
    setTimeout(() => btn.innerText = oldText, 600);
  }
}

function renderFolders() {
  let container = document.getElementById('foldersList');
  container.innerHTML = '';
  folders.forEach(folder => {
    let div = document.createElement('div');
    div.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
    div.innerText = folder.name;
    div.onclick = () => {
      currentFolderId = folder.id;
      fullRender();
    };
    container.appendChild(div);
  });
  
  let addBtn = document.createElement('div');
  addBtn.className = 'folder-item';
  addBtn.innerText = '+ नया';
  addBtn.onclick = () => {
    let name = prompt('फोल्डर का नाम?');
    if(name && name.trim()) {
      folders.push({id: 'f_' + Date.now(), name: name.trim()});
      currentFolderId = folders[folders.length-1].id;
      saveToLocal();
      fullRender();
      showToast('फोल्डर बन गया');
    }
  };
  container.appendChild(addBtn);
}

function renderNotes() {
  let container = document.getElementById('notesListArea');
  let folderNotes = notes.filter(n => n.folderId === currentFolderId);
  
  // सॉर्ट: पिन वाले ऊपर
  folderNotes.sort((a,b) => {
    if(a.isEmpty && !b.isEmpty) return -1;
    if(!a.isEmpty && b.isEmpty) return 1;
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    return 0;
  });
  
  let realNotes = folderNotes.filter(n => !n.isEmpty);
  realNotes.forEach((n, i) => n.displayNumber = realNotes.length - i);
  
  container.innerHTML = '';
  
  folderNotes.forEach(note => {
    let card = document.createElement('div');
    let isEmpty = note.isEmpty;
    
    if(isEmpty) {
      let nextNum = realNotes.length + 1;
      card.className = 'empty-card';
      card.innerHTML = `
        <div style="font-size:0.7rem;color:#666;margin-bottom:5px">#${nextNum}</div>
        <div class="empty-card-header" contenteditable="true" id="title_${note.id}" data-placeholder="शीर्षक लिखें..."></div>
        <textarea id="text_${note.id}" class="empty-text-input" placeholder="यहाँ नोट लिखें..."></textarea>
        <button class="save-empty-btn" data-id="${note.id}">💾 सेव करें</button>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="copy-title-btn" data-id="${note.id}">📋 टाइटल कॉपी</button>
          <button class="paste-title-btn" data-id="${note.id}">📌 टाइटल पेस्ट</button>
          <button class="copy-textarea-btn" data-id="${note.id}">📄 टेक्स्ट कॉपी</button>
        </div>
      `;
      
      setTimeout(() => {
        let titleDiv = document.getElementById(`title_${note.id}`);
        if(titleDiv) {
          titleDiv.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); titleDiv.blur(); } };
        }
      }, 10);
      
    } else {
      card.className = `note-item ${selectedNotes.has(note.id) ? 'selected' : ''}`;
      let preview = note.content ? note.content.substring(0, 60) : '';
      if(preview.length > 57) preview = preview.slice(0, 55) + '...';
      
      card.innerHTML = `
        <div class="note-title">
          <span class="note-number">#${note.displayNumber}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(note.title || 'बिना शीर्षक')}</span>
          ${note.pinned ? '📌' : ''}
          <button class="copy-title-note" data-id="${note.id}" style="padding:2px 8px">C</button>
        </div>
        <div class="note-preview">${escapeHtml(preview)}</div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="copy-content-note" data-id="${note.id}" style="padding:4px 10px">📋 कॉपी</button>
        </div>
      `;
      
      // लॉन्ग प्रेस सेलेक्शन के लिए
      let pressTimer;
      card.ontouchstart = (e) => {
        if(!selectionMode) {
          pressTimer = setTimeout(() => {
            toggleSelectionMode();
            selectNote(note.id, card);
          }, 500);
        }
      };
      card.ontouchend = () => clearTimeout(pressTimer);
      card.ontouchmove = () => clearTimeout(pressTimer);
      
      card.onclick = (e) => {
        if(e.target.closest('.copy-title-note') || e.target.closest('.copy-content-note')) return;
        if(selectionMode) {
          toggleNoteSelection(note.id, card);
        } else {
          openFullscreen(note);
        }
      };
    }
    
    container.appendChild(card);
  });
  
  // बटन के इवेंट
  document.querySelectorAll('.save-empty-btn').forEach(btn => {
    btn.onclick = () => {
      let id = btn.getAttribute('data-id');
      let titleDiv = document.getElementById(`title_${id}`);
      let textarea = document.getElementById(`text_${id}`);
      let title = titleDiv?.innerText.trim() || '';
      let content = textarea?.value.trim() || '';
      
      if(content) {
        let finalTitle = title || content.split('\n')[0].substring(0, 40) || 'नया नोट';
        notes.push({
          id: Date.now() + '_' + Math.random(),
          folderId: currentFolderId,
          title: finalTitle,
          content: content,
          pinned: false
        });
        if(titleDiv) titleDiv.innerText = '';
        if(textarea) textarea.value = '';
        saveToLocal();
        renderNotes();
        showToast('नोट सेव हो गया! ✅');
      } else {
        showToast('कुछ लिखो भाई! ✍️');
      }
    };
  });
  
  document.querySelectorAll('.copy-title-note').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      let note = notes.find(n => n.id === btn.getAttribute('data-id'));
      copyText(note?.title, btn);
    };
  });
  
  document.querySelectorAll('.copy-content-note').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      let note = notes.find(n => n.id === btn.getAttribute('data-id'));
      copyText(note?.content, btn);
    };
  });
  
  document.querySelectorAll('.copy-title-btn').forEach(btn => {
    btn.onclick = async () => {
      let id = btn.getAttribute('data-id');
      let titleDiv = document.getElementById(`title_${id}`);
      copyText(titleDiv?.innerText, btn);
    };
  });
  
  document.querySelectorAll('.paste-title-btn').forEach(btn => {
    btn.onclick = async () => {
      let id = btn.getAttribute('data-id');
      let titleDiv = document.getElementById(`title_${id}`);
      try {
        let text = await navigator.clipboard.readText();
        if(titleDiv && text) {
          titleDiv.innerText = text;
          showToast('पेस्ट हो गया');
        }
      } catch(e) { showToast('पहले कॉपी करो'); }
    };
  });
  
  document.querySelectorAll('.copy-textarea-btn').forEach(btn => {
    btn.onclick = async () => {
      let id = btn.getAttribute('data-id');
      let textarea = document.getElementById(`text_${id}`);
      copyText(textarea?.value, btn);
    };
  });
}

function selectNote(id, element) {
  if(!selectedNotes.has(id)) {
    selectedNotes.add(id);
    selectedOrder.push(id);
    element.classList.add('selected');
    updateSelectionCount();
  }
}

function toggleNoteSelection(id, element) {
  if(selectedNotes.has(id)) {
    selectedNotes.delete(id);
    let idx = selectedOrder.indexOf(id);
    if(idx > -1) selectedOrder.splice(idx, 1);
    element.classList.remove('selected');
  } else {
    selectedNotes.add(id);
    selectedOrder.push(id);
    element.classList.add('selected');
  }
  updateSelectionCount();
  if(selectedNotes.size === 0) toggleSelectionMode();
}

function toggleSelectionMode() {
  selectionMode = !selectionMode;
  if(selectionMode) {
    document.getElementById('selectionToolbar').classList.add('show');
  } else {
    document.getElementById('selectionToolbar').classList.remove('show');
    selectedNotes.clear();
    selectedOrder = [];
    document.querySelectorAll('.note-item').forEach(el => el.classList.remove('selected'));
  }
  updateSelectionCount();
}

function updateSelectionCount() {
  document.getElementById('selectionCount').innerText = selectedNotes.size;
}

function openFullscreen(note) {
  let modal = document.createElement('div');
  modal.className = 'fullscreen-modal';
  modal.innerHTML = `
    <div class="fullscreen-header">
      <input id="fsTitle" value="${escapeHtml(note.title)}" placeholder="शीर्षक">
      <button id="fsClose" style="background:#c62828;padding:8px 16px">✕ बंद करें</button>
    </div>
    <div id="fsContent" class="fullscreen-content" contenteditable="true">${escapeHtml(note.content)}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button id="fsSave" style="background:#ffd966;color:#000;flex:1">💾 सेव करें (Ctrl+S)</button>
    </div>
  `;
  document.body.appendChild(modal);
  document.body.style.overflow = 'hidden';
  
  let titleInput = document.getElementById('fsTitle');
  let contentDiv = document.getElementById('fsContent');
  
  let save = () => {
    note.title = titleInput.value.trim() || 'बिना शीर्षक';
    note.content = contentDiv.innerText;
    saveToLocal();
    renderNotes();
    modal.remove();
    document.body.style.overflow = '';
    showToast('सेव हो गया!');
  };
  
  document.getElementById('fsSave').onclick = save;
  document.getElementById('fsClose').onclick = () => {
    modal.remove();
    document.body.style.overflow = '';
  };
  
  contentDiv.onkeydown = (e) => {
    if((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      save();
    }
  };
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function fullRender() {
  renderFolders();
  renderNotes();
}

// सेलेक्शन टूलबार के बटन
document.getElementById('selectAllBtn').onclick = () => {
  let allNotes = document.querySelectorAll('.note-item');
  if(selectedNotes.size === allNotes.length && allNotes.length > 0) {
    selectedNotes.clear();
    selectedOrder = [];
    allNotes.forEach(n => n.classList.remove('selected'));
  } else {
    selectedOrder = [];
    allNotes.forEach(card => {
      let id = card.querySelector('.copy-title-note')?.getAttribute('data-id');
      if(id && !selectedNotes.has(id)) {
        selectedNotes.add(id);
        selectedOrder.push(id);
        card.classList.add('selected');
      }
    });
  }
  updateSelectionCount();
};

document.getElementById('pinSelectedBtn').onclick = () => {
  if(selectedNotes.size === 0) return showToast('कोई नोट सेलेक्ट नहीं');
  for(let id of selectedOrder) {
    let note = notes.find(n => n.id === id);
    if(note) note.pinned = !note.pinned;
  }
  saveToLocal();
  renderNotes();
  toggleSelectionMode();
  showToast('पिन अपडेट हो गया');
};

document.getElementById('deleteSelectedBtn').onclick = () => {
  if(selectedNotes.size === 0) return showToast('कोई नोट सेलेक्ट नहीं');
  if(confirm(`${selectedNotes.size} नोट हटाएँ?`)) {
    notes = notes.filter(n => !selectedNotes.has(n.id));
    saveToLocal();
    renderNotes();
    toggleSelectionMode();
    showToast('हटा दिया गया');
  }
};

document.getElementById('cancelSelectionBtn').onclick = toggleSelectionMode;

// ============== सर्विस वर्कर रजिस्टर ==============
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(() => {
    console.log('SW रजिस्टर हो गया ⚡');
  });
}

// ============== ऐप शुरू ==============
loadFromLocal();
fullRender();
</script>
</body>
</html>
